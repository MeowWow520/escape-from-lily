name: CI - Windows MSVC x64

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # 推荐使用 Ninja（比 MSBuild 更快）
  CMAKE_GENERATOR: Ninja
  # vcpkg 二进制缓存（强烈推荐，显著加速后续构建）
  VCPKG_BINARY_SOURCES: "clear;nuget,https://pkgs.dev.azure.com/github/vcpkg/public/_packaging/vcpkg/nuget/v3/index.json,readwrite"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false   # 如果你的 vcpkg 有子模块依赖，可改为 true

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64          # 明确 x64 (win64)

      - name: Setup CMake (最新版本)
        uses: lukka/get-cmake@latest

      # ==================== vcpkg 部分 ====================
      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          # 如果你想固定 vcpkg 版本，建议把 vcpkg 作为 submodule 加到仓库
          # 这里使用 GitHub 上最新的 vcpkg（推荐方式）
          git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/vcpkg
          cd ${{ github.workspace }}/vcpkg
          ./bootstrap-vcpkg.bat -disableMetrics

      - name: Install vcpkg dependencies (manifest mode)
        shell: pwsh
        run: \( {{ github.workspace }}/vcpkg/vcpkg install --triplet x64-windows --x-install-root=" \){{ github.workspace }}/vcpkg_installed"
     
      # ==================== CMake 配置与构建 ====================
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -S . `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CXX_STANDARD=20 `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" `
            -D CMAKE_PREFIX_PATH="${{ github.workspace }}/vcpkg_installed/x64-windows"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel
